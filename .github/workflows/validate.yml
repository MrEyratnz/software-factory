name: validate

on:
  push:
    branches: ['**']
  pull_request:

# Least privilege: this workflow only reads the checkout and runs tests — it
# never writes to the repo or uses secrets. An explicit read-only token here
# means a fork PR (once this repo is public) can never obtain a write-scoped
# token from CI, regardless of the repo's default-token setting.
permissions:
  contents: read

env:
  # Pinned claude-code CLI version for `plugin validate` — keep in sync with
  # the same pin in .github/workflows/release-plugin.yml.
  CLAUDE_CODE_VERSION: "2.1.202"

jobs:
  connector:
    name: connector (unit + stdio protocol)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: connector tests (zero-dep, node --test)
        run: cd connector && node --test "test/**/*.test.mjs"

  hooks:
    name: hooks contract + shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: shellcheck the hook scripts and lib
        run: shellcheck -S warning hooks/scripts/*.sh hooks/lib/common.sh tests/hooks.contract.test.sh
      - name: hermetic hook contract tests (synthetic stdin, throwaway repos, gh shim)
        run: |
          git config --global user.email ci@example.com
          git config --global user.name ci
          bash tests/hooks.contract.test.sh

  manifests:
    name: manifest + component validation (claude plugin validate --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: validate plugin components (commands/agents/skills/hooks frontmatter)
        run: npx --yes @anthropic-ai/claude-code@${{ env.CLAUDE_CODE_VERSION }} plugin validate .claude-plugin/plugin.json --strict
      - name: validate marketplace manifest
        run: npx --yes @anthropic-ai/claude-code@${{ env.CLAUDE_CODE_VERSION }} plugin validate .claude-plugin/marketplace.json --strict

  structural:
    name: structural checks (JSON + frontmatter presence)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      # release-plugin.yml triggers only on push to main, so it is never
      # exercised by this PR-CI workflow — a YAML syntax error in it would
      # otherwise only surface after merge. Parse every workflow file here so
      # a broken release-plugin.yml (or any other workflow) fails the PR.
      # Matches *.yml AND *.yaml, and uses a custom loader that raises on
      # duplicate mapping keys (top-level or nested) — plain yaml.safe_load
      # silently accepts duplicates (last one wins), which would hide the
      # exact failure class this lint exists to catch.
      - name: every .github/workflows/*.yml(+.yaml) file parses as valid, duplicate-key-free YAML
        run: |
          python3 -c "import yaml" 2>/dev/null || pip install --quiet pyyaml
          python3 -c '
          import glob
          import yaml

          class DuplicateKeyError(Exception):
              pass

          class UniqueKeyLoader(yaml.SafeLoader):
              def construct_mapping(self, node, deep=False):
                  seen = set()
                  for key_node, _ in node.value:
                      key = self.construct_object(key_node, deep=deep)
                      if key in seen:
                          raise DuplicateKeyError(
                              f"duplicate key {key!r} at line {key_node.start_mark.line + 1}"
                          )
                      seen.add(key)
                  return super().construct_mapping(node, deep=deep)

          files = sorted(glob.glob(".github/workflows/*.yml") + glob.glob(".github/workflows/*.yaml"))
          for f in files:
              with open(f) as fh:
                  yaml.load(fh, Loader=UniqueKeyLoader)
              print("ok  " + f)
          '
      - name: all JSON manifests/schemas parse
        run: |
          for f in .claude-plugin/plugin.json .claude-plugin/marketplace.json .mcp.json \
                   schemas/*.json connector/package.json templates/factory/config.json.tmpl; do
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" && echo "ok  $f"
          done
      - name: every command/agent/skill begins with YAML frontmatter
        run: |
          fail=0
          for f in commands/*.md agents/*.md skills/*/SKILL.md; do
            if [ "$(head -1 "$f")" != "---" ]; then echo "MISSING frontmatter: $f"; fail=1; fi
          done
          exit $fail
      - name: every hooks.json script exists and is executable
        run: |
          node -e '
            const fs=require("fs");
            const h=JSON.parse(fs.readFileSync("hooks/hooks.json","utf8")).hooks;
            let bad=0;
            for(const ev of Object.keys(h)) for(const m of h[ev]) for(const hk of (m.hooks||[])){
              const p=(hk.command||"").replace("${CLAUDE_PLUGIN_ROOT}/","");
              if(!p) continue;
              if(!fs.existsSync(p)){console.log("missing",p);bad=1;continue;}
              if(!(fs.statSync(p).mode & 0o111)){console.log("not executable",p);bad=1;}
            }
            process.exit(bad);
          '
