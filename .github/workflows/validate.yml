name: validate

on:
  push:
    branches: ['**']
  pull_request:

# Least privilege: this workflow only reads the checkout and runs tests — it
# never writes to the repo or uses secrets. An explicit read-only token here
# means a fork PR (once this repo is public) can never obtain a write-scoped
# token from CI, regardless of the repo's default-token setting.
permissions:
  contents: read

env:
  # Pinned claude-code CLI version for `plugin validate` — keep in sync with
  # the same pin in .github/workflows/release-plugin.yml. ≥ 2.1.203 is required
  # by the factory session workflows (dynamic workflows + ultracode effort).
  CLAUDE_CODE_VERSION: "2.1.218"

jobs:
  connector:
    name: connector (unit + stdio protocol)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with: { node-version: 22 }
      - name: connector tests (zero-dep, node --test)
        run: cd connector && node --test "test/**/*.test.mjs"

  hooks:
    name: hooks contract + shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with: { node-version: 22 }
      - name: shellcheck the hook scripts, lib, tests, and bootstrap
        run: shellcheck -S warning hooks/scripts/*.sh hooks/lib/common.sh tests/*.sh bootstrap.sh
      # The scaffold contract's #97 permission invariants need pyyaml to parse
      # the workflows. Install it here rather than relying on the runner image
      # shipping it: without it those checks would defer to a CI job that never
      # runs them, and the invariant would quietly stop being enforced anywhere.
      - name: ensure pyyaml (the scaffold contract's permission invariants need it)
        run: python3 -c "import yaml" 2>/dev/null || pip install --quiet pyyaml
      - name: scaffold contract (factory workflows, config, ops state, docs spine)
        run: bash tests/scaffold.contract.test.sh
      # Wire the bootstrap contract into the AUTHORITATIVE gate, not just the
      # nightly run-suite: it pins the 15 audited bootstrap.sh defects and is
      # fully hermetic (stub gh/git/node, no network), so a commit re-introducing
      # e.g. the user/installations 403 poll must fail the required check rather
      # than surface a day later in a nightly QA bug (#105).
      - name: bootstrap contract (hermetic — the 15 audited bootstrap defects)
        run: bash tests/bootstrap.contract.test.sh
      - name: hermetic hook contract tests (synthetic stdin, throwaway repos, gh shim)
        run: |
          git config --global user.email ci@example.com
          git config --global user.name ci
          bash tests/hooks.contract.test.sh

  triage-scripts:
    name: triage wrapper scripts (shellcheck + argument-contract tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: shellcheck the triage + project-status scripts
        run: shellcheck -S warning scripts/*.sh
      # The triage wrapper scripts are the Issue Triage workflow's enforcement
      # boundary (see .github/workflows/claude-issue-triage.yml) — the only
      # thing preventing a prompt-injected triage session from retargeting
      # another issue/PR — and their argument contract regresses silently
      # without this. Hermetic: a stub gh records argv, no network, no Node.
      - name: triage wrapper argument-contract tests
        run: ./scripts/test-triage-scripts.sh

  manifests:
    name: manifest + component validation (claude plugin validate --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with: { node-version: 22 }
      - name: validate plugin components (commands/agents/skills/hooks frontmatter)
        run: npx --yes @anthropic-ai/claude-code@${{ env.CLAUDE_CODE_VERSION }} plugin validate .claude-plugin/plugin.json --strict
      - name: validate marketplace manifest
        run: npx --yes @anthropic-ai/claude-code@${{ env.CLAUDE_CODE_VERSION }} plugin validate .claude-plugin/marketplace.json --strict

  structural:
    name: structural checks (JSON + frontmatter presence)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with: { node-version: 22 }
      # release-plugin.yml triggers only on push to main, so it is never
      # exercised by this PR-CI workflow — a YAML syntax error in it would
      # otherwise only surface after merge. Parse every workflow file here so
      # a broken release-plugin.yml (or any other workflow) fails the PR.
      # Matches *.yml AND *.yaml, and uses a custom loader that raises on
      # duplicate mapping keys (top-level or nested) — plain yaml.safe_load
      # silently accepts duplicates (last one wins), which would hide the
      # exact failure class this lint exists to catch.
      - name: every .github/workflows/*.yml(+.yaml) file parses as valid, duplicate-key-free YAML
        run: |
          python3 -c "import yaml" 2>/dev/null || pip install --quiet pyyaml
          python3 -c '
          import glob
          import yaml

          class DuplicateKeyError(Exception):
              pass

          class UniqueKeyLoader(yaml.SafeLoader):
              def construct_mapping(self, node, deep=False):
                  seen = set()
                  for key_node, _ in node.value:
                      key = self.construct_object(key_node, deep=deep)
                      if key in seen:
                          raise DuplicateKeyError(
                              f"duplicate key {key!r} at line {key_node.start_mark.line + 1}"
                          )
                      seen.add(key)
                  return super().construct_mapping(node, deep=deep)

          files = sorted(glob.glob(".github/workflows/*.yml") + glob.glob(".github/workflows/*.yaml"))
          for f in files:
              with open(f) as fh:
                  yaml.load(fh, Loader=UniqueKeyLoader)
              print("ok  " + f)
          '
      - name: all JSON manifests/schemas parse
        run: |
          for f in .claude-plugin/plugin.json .claude-plugin/marketplace.json .mcp.json \
                   schemas/*.json connector/package.json templates/factory/config.json.tmpl; do
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" && echo "ok  $f"
          done
      # The structural backstop for THIS repo's enforcement contract (issue #80):
      # a malformed-JSON config already fails the hooks closed (issue #65), but a
      # structurally-invalid-but-parseable one (a dropped required key, a
      # non-string gates.* command) silently degrades to defaults at runtime. This
      # validates the committed .factory/config.json against the schema so such a
      # drift fails CI. The validator's own unit tests run first.
      - name: workflow-logic unit tests (config validator, PR review verdict)
        run: node --test scripts/validate-config.test.mjs scripts/pr-review-state.test.mjs scripts/merge-method.test.mjs
      - name: .factory/config.json validates against schemas/factory.config.schema.json
        run: node scripts/validate-config.mjs .factory/config.json schemas/factory.config.schema.json
      # The seed /factory-init copies into every consuming repo — validate it too
      # so a drift in the template doesn't ship broken configs to new repos. It
      # lives in this repo, so no schema-vendoring is needed (that's the
      # consumer-CI part left as follow-up).
      - name: templates/factory/config.json.tmpl validates against the schema
        run: node scripts/validate-config.mjs templates/factory/config.json.tmpl schemas/factory.config.schema.json
      - name: every command/agent/skill begins with YAML frontmatter
        run: |
          fail=0
          for f in commands/*.md agents/*.md skills/*/SKILL.md; do
            if [ "$(head -1 "$f")" != "---" ]; then echo "MISSING frontmatter: $f"; fail=1; fi
          done
          exit $fail
      - name: every hooks.json script exists and is executable
        run: |
          node -e '
            const fs=require("fs");
            const h=JSON.parse(fs.readFileSync("hooks/hooks.json","utf8")).hooks;
            let bad=0;
            for(const ev of Object.keys(h)) for(const m of h[ev]) for(const hk of (m.hooks||[])){
              const p=(hk.command||"").replace("${CLAUDE_PLUGIN_ROOT}/","");
              if(!p) continue;
              if(!fs.existsSync(p)){console.log("missing",p);bad=1;continue;}
              if(!(fs.statSync(p).mode & 0o111)){console.log("not executable",p);bad=1;}
            }
            process.exit(bad);
          '

  # The single aggregate context branch protection requires ("merged with green
  # tests" needs ONE stable required-check name, not a moving list of job
  # names). bootstrap.sh points the main-branch protection at this check.
  green-gate:
    name: green-gate
    if: always()
    needs: [connector, hooks, triage-scripts, manifests, structural]
    runs-on: ubuntu-latest
    steps:
      - name: every validate job succeeded
        env:
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          echo "results: $RESULTS"
          case ",$RESULTS," in
            *,failure,*|*,cancelled,*|*,skipped,*) echo "a required job did not succeed"; exit 1 ;;
            *) echo "green" ;;
          esac
