name: release

# The plugin dogfoods its own conventional-release law. On every push to main,
# release-please maintains a release PR batching Conventional-Commit changes and
# bumping the version across plugin.json, marketplace.json, and the connector's
# package.json. Merging it would cut a vX.Y.Z tag + GitHub Release (Claude Code
# marketplaces install from a git ref). GATED: the full hermetic validate.yml
# must be green (branch protection) before the release PR can merge, AND the
# built artifact on that exact main-HEAD commit is validated + smoke-tested by
# the `verify` job below BEFORE release-please is allowed to run — a red
# artifact can never get a tag cut for it. The `smoke` job then re-confirms
# the ACTUAL published tag on a clean checkout, as a final belt-and-braces
# check (it cannot un-cut a tag, so `verify` is the real gate).
#
# The claude-code CLI version used to run `plugin validate` is pinned (not
# `npx @anthropic-ai/claude-code@latest`) so an upstream validator change
# can't silently tighten or loosen this gate out from under us.

on:
  push:
    branches: [main]

# Never let two overlapping pushes to main race the release: serialize runs
# per ref, and let an in-flight release finish rather than cancelling it
# mid-tag (a half-finished release-please/smoke run must not be killed).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Least privilege at the workflow level: the verify + smoke jobs only read the
# checkout. Only the release-please job needs write, and it declares that scope
# itself below.
permissions:
  contents: read

env:
  # Pinned claude-code CLI version for `plugin validate` — keep in sync with
  # the same pin in .github/workflows/validate.yml's `manifests` job.
  CLAUDE_CODE_VERSION: "2.1.202"

jobs:
  verify:
    name: validate + smoke the built artifact on main HEAD (pre-tag gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: 22 }
      # Validate the artifact release-please is about to tag, on this exact
      # commit — before any tag or GitHub Release exists for it.
      - name: claude plugin validate (pre-tag, plugin manifest)
        run: npx --yes @anthropic-ai/claude-code@${{ env.CLAUDE_CODE_VERSION }} plugin validate .claude-plugin/plugin.json --strict
      - name: claude plugin validate (pre-tag, marketplace manifest)
        run: npx --yes @anthropic-ai/claude-code@${{ env.CLAUDE_CODE_VERSION }} plugin validate .claude-plugin/marketplace.json --strict
      # Boot the bundled connector over stdio asserting the expected tools
      # are advertised, on this exact commit.
      - name: connector boots and advertises its tools (pre-tag)
        run: cd connector && node --test "test/**/*.test.mjs"

  release-please:
    needs: verify
    runs-on: ubuntu-latest
    # The only job that mutates the repo: release-please opens/updates the
    # release PR and cuts the tag + GitHub Release.
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      # release-please opens a release PR, which requires ONE of:
      #   (a) repo Settings → Actions → General → Workflow permissions →
      #       "Allow GitHub Actions to create and approve pull requests" = ON
      #       (then the default GITHUB_TOKEN below works), OR
      #   (b) a RELEASE_PLEASE_TOKEN secret (a PAT with contents:write +
      #       pull-requests:write) — used automatically if present.
      # Without one of these, the default GITHUB_TOKEN cannot create the PR
      # ("GitHub Actions is not permitted to create or approve pull requests").
      #
      # SHA-resolution spike (issue #17): confirmed release-please tags the
      # merged release PR's OWN recorded commit, not a dynamically-resolved
      # live tip of main. `buildRelease()` in release-please's
      # src/strategies/base.ts sets the release object's `sha` field to
      # `mergedPullRequest.sha`, and that `mergedPullRequest` is discovered in
      # src/manifest.ts's `findMergedReleasePullRequests()` by iterating
      # merged PRs against `targetBranch` looking for the release-please
      # label/branch, reading that PR's own recorded merge commit — it never
      # re-queries "whatever main's tip is right now". Because this job only
      # runs inside the single workflow run that the release PR's merge
      # itself triggered (on: push: branches: [main]), that recorded merge
      # commit IS this run's `github.sha` — the same commit `verify` (above)
      # already validated and smoke-tested. Source: googleapis/release-please
      # src/strategies/base.ts (buildRelease: `sha: mergedPullRequest.sha`)
      # and src/manifest.ts (findMergedReleasePullRequests via
      # this.github.pullRequestIterator(this.targetBranch, ...)).
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  smoke:
    name: smoke-test the released tag on a clean checkout
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - uses: actions/setup-node@v6
        with: { node-version: 22 }
      # Smoke the ACTUAL released artifact: validate it as a plugin, and boot the
      # bundled connector over stdio asserting the expected tools are advertised.
      - name: claude plugin validate (released tag)
        run: npx --yes @anthropic-ai/claude-code@${{ env.CLAUDE_CODE_VERSION }} plugin validate .claude-plugin/plugin.json --strict
      - name: connector boots and advertises its tools
        run: |
          cd connector && node --test "test/**/*.test.mjs"
